<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects — VaultCRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script>tailwind.config={darkMode:'class',theme:{extend:{fontFamily:{sans:['Inter','sans-serif'],display:['Outfit','sans-serif']},colors:{surface:{primary:'#0a0a12',secondary:'#11111b',elevated:'#1a1a2e',glass:'rgba(255,255,255,0.04)'},accent:{cyan:'#06b6d4',indigo:'#6366f1',violet:'#8b5cf6',rose:'#f43f5e',emerald:'#10b981',amber:'#f59e0b'},vault:{700:'#4338ca'}}}}}</script>
    <link rel="stylesheet" href="css/demo.css">
</head>
<body class="min-h-screen flex bg-surface-primary font-sans antialiased text-slate-200">
    <div id="sidebar-overlay" class="hidden fixed inset-0 z-30 bg-black/60 backdrop-blur-sm lg:hidden"></div>
    <aside id="portal-sidebar" class="fixed inset-y-0 left-0 z-40 w-64 bg-surface-secondary border-r border-white/5 transform -translate-x-full lg:translate-x-0 lg:static lg:inset-auto transition-transform duration-300 ease-out flex flex-col">
        <div class="flex items-center gap-3 px-6 py-5 border-b border-white/5"><img src="logo.png" alt="VaultCRM" class="w-9 h-9 rounded-lg object-contain"><span class="font-display font-bold text-lg text-white tracking-tight">VaultCRM</span></div>
        <nav id="sidebar-nav" class="flex-1 px-3 py-4 space-y-1 overflow-y-auto"></nav>
        <div id="sidebar-user" class="px-4 py-4 border-t border-white/5"></div>
    </aside>
    <div class="flex-1 flex flex-col min-h-screen">
        <header class="sticky top-0 z-20 bg-surface-primary/80 backdrop-blur-lg border-b border-white/5">
            <div class="flex items-center justify-between px-4 lg:px-8 py-3">
                <div class="flex items-center gap-4">
                    <button id="sidebar-toggle" class="lg:hidden p-2 text-slate-400 hover:text-white transition-colors"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg></button>
                    <h1 class="text-lg font-display font-semibold text-white">Projects</h1>
                </div>
            </div>
        </header>
        <main id="projects-content" class="flex-1 p-4 lg:p-8"></main>
    </div>
    <script src="js/demo-data.js"></script>
    <script src="js/demo-app.js"></script>
    <script>
    document.addEventListener('DOMContentLoaded', () => {
        const user = requireAuth();
        if (!user) return;
        populateSidebar(user);
        initMobileSidebar();

        const projects = user.role === 'admin' ? DEMO_PROJECTS : DEMO_PROJECTS.filter(p => p.client === user.name);
        const container = document.getElementById('projects-content');

        container.innerHTML = `<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 animate-fadeIn">
            ${projects.map(p => {
                const stColor = statusBadgeClass(p.status);
                return `<div class="bg-surface-elevated border border-white/5 rounded-[0.875rem] p-5 shadow-lg hover:shadow-[0_8px_30px_rgba(0,0,0,0.4)] transition-all duration-300">
                    <div class="flex items-start justify-between mb-3">
                        <div><a href="kanban.html" class="text-sm font-semibold text-white hover:text-cyan-400 transition-colors">${p.title}</a><p class="text-xs text-slate-500 mt-0.5">${p.client}</p></div>
                        ${renderBadge(p.status.replace('_',' ').replace(/\b\w/g,c=>c.toUpperCase()), stColor)}
                    </div>
                    <div class="flex items-center justify-between text-xs text-slate-500 mb-3"><span>${p.tasksCount} tasks</span>${p.deadline ? `<span>Due ${p.deadline}</span>` : ''}</div>
                    <div class="w-full h-1.5 bg-surface-primary rounded-full overflow-hidden"><div class="h-full bg-gradient-to-r from-indigo-500 to-cyan-500 rounded-full transition-all duration-500" style="width:${p.completion}%"></div></div>
                    <div class="flex items-center justify-between mt-3"><span class="text-xs text-slate-500">${p.completion}% complete</span><a href="kanban.html" class="text-xs text-indigo-400 hover:text-cyan-400 transition-colors">Open Board →</a></div>
                </div>`;
            }).join('')}
        </div>`;
    });
    </script>
</body>
</html>
