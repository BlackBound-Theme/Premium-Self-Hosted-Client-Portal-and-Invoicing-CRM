<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clients — VaultCRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script>tailwind.config={darkMode:'class',theme:{extend:{fontFamily:{sans:['Inter','sans-serif'],display:['Outfit','sans-serif']},colors:{surface:{primary:'#0a0a12',secondary:'#11111b',elevated:'#1a1a2e',glass:'rgba(255,255,255,0.04)'},accent:{cyan:'#06b6d4',indigo:'#6366f1',violet:'#8b5cf6',rose:'#f43f5e',emerald:'#10b981',amber:'#f59e0b'},vault:{700:'#4338ca'}}}}}</script>
    <link rel="stylesheet" href="css/demo.css">
</head>
<body class="min-h-screen flex bg-surface-primary font-sans antialiased text-slate-200">
    <div id="sidebar-overlay" class="hidden fixed inset-0 z-30 bg-black/60 backdrop-blur-sm lg:hidden"></div>
    <aside id="portal-sidebar" class="fixed inset-y-0 left-0 z-40 w-64 bg-surface-secondary border-r border-white/5 transform -translate-x-full lg:translate-x-0 lg:static lg:inset-auto transition-transform duration-300 ease-out flex flex-col">
        <div class="flex items-center gap-3 px-6 py-5 border-b border-white/5"><img src="logo.png" alt="VaultCRM" class="w-9 h-9 rounded-lg object-contain"><span class="font-display font-bold text-lg text-white tracking-tight">VaultCRM</span></div>
        <nav id="sidebar-nav" class="flex-1 px-3 py-4 space-y-1 overflow-y-auto"></nav>
        <div id="sidebar-user" class="px-4 py-4 border-t border-white/5"></div>
    </aside>
    <div class="flex-1 flex flex-col min-h-screen">
        <header class="sticky top-0 z-20 bg-surface-primary/80 backdrop-blur-lg border-b border-white/5">
            <div class="flex items-center justify-between px-4 lg:px-8 py-3">
                <div class="flex items-center gap-4">
                    <button id="sidebar-toggle" class="lg:hidden p-2 text-slate-400 hover:text-white transition-colors"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg></button>
                    <h1 class="text-lg font-display font-semibold text-white">Client Management</h1>
                </div>
            </div>
        </header>
        <main id="clients-content" class="flex-1 p-4 lg:p-8"></main>
    </div>
    <script src="js/demo-data.js"></script>
    <script src="js/demo-app.js"></script>
    <script>
    document.addEventListener('DOMContentLoaded', () => {
        const user = requireAuth();
        if (!user) return;
        populateSidebar(user);
        initMobileSidebar();
        const container = document.getElementById('clients-content');

        container.innerHTML = `<div class="space-y-3 animate-fadeIn">
            ${DEMO_CLIENTS.map(c => `
            <div class="bg-surface-elevated border border-white/5 rounded-[0.875rem] p-5 shadow-lg hover:shadow-[0_8px_30px_rgba(0,0,0,0.4)] transition-all duration-300">
                <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-3">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 rounded-full bg-gradient-to-br from-violet-500 to-indigo-500 flex items-center justify-center text-sm font-bold text-white shrink-0">${c.name.charAt(0)}</div>
                        <div><p class="text-sm font-semibold text-white">${c.name}</p><p class="text-xs text-slate-500">${c.email} · ${c.company}</p></div>
                    </div>
                    <div class="flex items-center gap-4">
                        <span class="text-xs text-slate-400">${c.projects} proj · ${c.invoices} inv</span>
                        ${renderBadge(c.active ? 'Active' : 'Inactive', c.active ? 'emerald' : 'rose')}
                        <button onclick="this.closest('.bg-surface-elevated').querySelector('.vault-toggle-status')?.click()" class="p-1.5 text-slate-500 hover:text-white transition-colors" title="Edit">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
                        </button>
                    </div>
                </div>
            </div>`).join('')}
        </div>`;
    });
    </script>
</body>
</html>
